name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  PROVIDER_NAME: powerplatform
  PYTHON_VERSION: "3.12"

jobs:
  validate-version:
    name: Validate version input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check version format and progression
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Validate format: must be vX.Y.Z
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match the required format vX.Y.Z (e.g. v0.1.0)"
            exit 1
          fi

          # Check version progression against the latest existing release
          LATEST=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // ""')

          if [ -n "$LATEST" ]; then
            NEW="${VERSION#v}"
            OLD="${LATEST#v}"

            IFS='.' read -r NEW_MAJOR NEW_MINOR NEW_PATCH <<< "$NEW"
            IFS='.' read -r OLD_MAJOR OLD_MINOR OLD_PATCH <<< "$OLD"

            if [ "$NEW_MAJOR" -lt "$OLD_MAJOR" ] || \
               ([ "$NEW_MAJOR" -eq "$OLD_MAJOR" ] && [ "$NEW_MINOR" -lt "$OLD_MINOR" ]) || \
               ([ "$NEW_MAJOR" -eq "$OLD_MAJOR" ] && [ "$NEW_MINOR" -eq "$OLD_MINOR" ] && [ "$NEW_PATCH" -le "$OLD_PATCH" ]); then
              echo "::error::New version '$VERSION' must be greater than the latest release '$LATEST'"
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  create-pre-release:
    name: Create pre-release
    runs-on: ubuntu-latest
    needs: [validate-version]
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.validate-version.outputs.version }}"
          git push origin "${{ needs.validate-version.outputs.version }}"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.validate-version.outputs.version }}" \
            --title "${{ needs.validate-version.outputs.version }}" \
            --generate-notes \
            --prerelease

  build-provider:
    name: Build provider plugin
    runs-on: ubuntu-latest
    needs: [validate-version, create-pre-release]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-version.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create plugin archive
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          ARCHIVE="pulumi-resource-${PROVIDER_NAME}-v${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"

          # Create a self-contained directory with the provider
          PLUGIN_DIR="pulumi-resource-${PROVIDER_NAME}"
          mkdir -p "$PLUGIN_DIR"

          # Install the provider and all of its dependencies into the plugin directory
          python -m pip install --target "$PLUGIN_DIR" .
          cp schema.json "$PLUGIN_DIR/"
          cp PulumiPlugin.yaml "$PLUGIN_DIR/"

          # Create a wrapper script that invokes the provider
          cat > "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}" <<'EOF'
#!/usr/bin/env bash
SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
PYTHONPATH="$SCRIPT_DIR${PYTHONPATH:+:$PYTHONPATH}" exec python -m rpothin_powerplatform "$@"
EOF
          chmod +x "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}"

          # Create a .cmd launcher for Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
          cat > "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}.cmd" <<'EOF'
@echo off
set SCRIPT_DIR=%~dp0
set PYTHONPATH=%SCRIPT_DIR%;%PYTHONPATH%
python -m rpothin_powerplatform %*
EOF
          fi

          tar -czf "$ARCHIVE" "$PLUGIN_DIR"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  publish-sdk-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [validate-version, build-provider]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/rpothin-powerplatform/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-version.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Set package version
        working-directory: sdk/python
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          sed -i "s/\${VERSION}/$VERSION/" pyproject.toml

      - name: Build SDK package
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    name: Publish Node.js SDK to npm
    runs-on: ubuntu-latest
    needs: [validate-version, build-provider]
    permissions:
      id-token: write
    environment:
      name: npmjs
      url: https://www.npmjs.com/package/@rpothin/powerplatform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for OIDC Trusted Publishing support
        run: npm i -g npm@11.5.1

      - name: Set package version
        working-directory: sdk/nodejs
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          sed -i "s/\${VERSION}/$VERSION/" package.json

      - name: Install, build, and publish
        working-directory: sdk/nodejs
        run: |
          npm install
          npm run build
          npm publish --access public

  publish-nuget:
    name: Publish .NET SDK to NuGet
    runs-on: ubuntu-latest
    needs: [validate-version, build-provider]
    permissions:
      id-token: write   # required for OIDC token issuance
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Rpothin.Powerplatform/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-version.outputs.version }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Set package version
        working-directory: sdk/dotnet
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          echo "$VERSION" > version.txt

      - name: Build SDK
        working-directory: sdk/dotnet
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          dotnet build Rpothin.Powerplatform.csproj \
            --configuration Release \
            /p:Version="$VERSION"

      - name: Pack SDK
        working-directory: sdk/dotnet
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          VERSION="${VERSION#v}"
          dotnet pack Rpothin.Powerplatform.csproj \
            --configuration Release \
            /p:Version="$VERSION" \
            --no-build \
            --output nupkgs

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        working-directory: sdk/dotnet
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-go:
    name: Publish Go module tag
    runs-on: ubuntu-latest
    needs: [validate-version, build-provider]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-version.outputs.version }}

      - name: Create Go module tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          GO_TAG="sdk/go/powerplatform/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${GO_TAG}" >/dev/null 2>&1; then
            echo "Go module tag ${GO_TAG} already exists."
            exit 0
          fi

          git tag "${GO_TAG}"
          git push origin "${GO_TAG}"

  publish-java:
    name: Publish Java SDK to Maven Central
    runs-on: ubuntu-latest
    needs: [validate-version, build-provider]
    env:
      PACKAGE_VERSION: ${{ needs.validate-version.outputs.version }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      PUBLISH_REPO_USERNAME: ${{ secrets.PUBLISH_REPO_USERNAME }}
      PUBLISH_REPO_PASSWORD: ${{ secrets.PUBLISH_REPO_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-version.outputs.version }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish Java SDK
        working-directory: sdk/java
        run: |
          export PACKAGE_VERSION="${PACKAGE_VERSION#v}"
          gradle publishToSonatype closeAndReleaseSonatypeStagingRepository

  promote-release:
    name: Promote release to latest
    runs-on: ubuntu-latest
    needs: [validate-version, publish-sdk-pypi, publish-npm, publish-nuget, publish-go, publish-java]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: provider-*
          merge-multiple: true

      - name: Upload archives and promote release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          gh release upload "$VERSION" artifacts/*.tar.gz --repo "${{ github.repository }}"
          gh release edit "$VERSION" --prerelease=false --latest --repo "${{ github.repository }}"
