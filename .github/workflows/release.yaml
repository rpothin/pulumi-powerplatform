name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROVIDER_NAME: powerplatform
  PYTHON_VERSION: "3.12"

jobs:
  build-provider:
    name: Build provider plugin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install provider package
        run: pip install .

      - name: Create plugin archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="pulumi-resource-${PROVIDER_NAME}-v${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"

          # Create a self-contained directory with the provider
          PLUGIN_DIR="pulumi-resource-${PROVIDER_NAME}"
          mkdir -p "$PLUGIN_DIR"

          # Copy the provider package and its entrypoint
          cp -r provider/pulumi_powerplatform "$PLUGIN_DIR/"
          cp schema.json "$PLUGIN_DIR/"
          cp PulumiPlugin.yaml "$PLUGIN_DIR/"

          # Create a wrapper script that invokes the provider
          cat > "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}" <<'WRAPPER'
#!/usr/bin/env bash
exec python -m pulumi_powerplatform "$@"
WRAPPER
          chmod +x "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}"

          # Create a .cmd launcher for Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
            cat > "$PLUGIN_DIR/pulumi-resource-${PROVIDER_NAME}.cmd" <<'CMDWRAPPER'
@echo off
python -m pulumi_powerplatform %*
CMDWRAPPER
          fi

          tar -czf "$ARCHIVE" "$PLUGIN_DIR"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}

  publish-sdk-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [build-provider]
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/pulumi-powerplatform/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build SDK package
        working-directory: sdk/python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    name: Publish Node.js SDK to npm
    runs-on: ubuntu-latest
    needs: [build-provider]
    environment:
      name: npmjs
      url: https://www.npmjs.com/package/@pulumi/powerplatform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install and publish
        working-directory: sdk/nodejs
        run: |
          npm install
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-provider, publish-sdk-pypi, publish-npm]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: provider-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
