name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check provider/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v

  sdk-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether schema.json changed
        id: schema_changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            MERGE_BASE=$(git merge-base "$BASE_SHA" HEAD)
            CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q "^schema\.json$"; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Pulumi CLI
        if: steps.schema_changed.outputs.schema_changed == 'true'
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Verify non-Python SDKs are up to date
        if: steps.schema_changed.outputs.schema_changed == 'true'
        run: |
          GEN_DIR=$(mktemp -d)
          pulumi package gen-sdk . --language nodejs --out "$GEN_DIR"
          pulumi package gen-sdk . --language go     --out "$GEN_DIR"
          pulumi package gen-sdk . --language dotnet --out "$GEN_DIR"
          pulumi package gen-sdk . --language java   --out "$GEN_DIR"
          bash ./scripts/normalize-dotnet-sdk.sh "$GEN_DIR/dotnet"

          STALE=""
          for lang in nodejs go dotnet java; do
            if ! diff -rq "$GEN_DIR/$lang" "sdk/$lang" > /dev/null 2>&1; then
              STALE="$STALE\n  - sdk/$lang"
            fi
          done

          if [ -n "$STALE" ]; then
            echo "ERROR: The following non-Python SDKs are out of sync with schema.json:"
            printf "$STALE\n"
            echo ""
            echo "Regenerate them and commit the result (see AGENTS.md):"
            echo "  pulumi package gen-sdk . --language nodejs --out sdk"
            echo "  pulumi package gen-sdk . --language go     --out sdk"
            echo "  pulumi package gen-sdk . --language dotnet --out sdk"
            echo "  pulumi package gen-sdk . --language java   --out sdk"
            exit 1
          fi

          echo "All non-Python SDKs are in sync with schema.json."

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate schema.json
        run: |
          python -c "
          import json, sys

          with open('schema.json') as f:
              schema = json.load(f)

          errors = []

          # Verify every resource has required structure.
          for name, res in schema.get('resources', {}).items():
              if 'inputProperties' not in res:
                  errors.append(f'Resource {name} missing inputProperties')
              if 'properties' not in res:
                  errors.append(f'Resource {name} missing properties')
              if 'requiredInputs' not in res:
                  errors.append(f'Resource {name} missing requiredInputs')

          # Verify every function has inputs and outputs.
          for name, func in schema.get('functions', {}).items():
              if 'outputs' not in func:
                  errors.append(f'Function {name} missing outputs')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)

          print(f'Schema is valid: {len(schema[\"resources\"])} resources, {len(schema[\"functions\"])} functions')
          "
